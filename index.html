<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email - NetZero</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      color: #cbd5f5;
    }

    .status {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 500;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }

    .loader {
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #334155;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    button {
      margin-top: 20px;
      padding: 12px 16px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Email Verification</h1>
    <p id="message">Verifying your email, please wait...</p>

    <div class="loader" id="loader"></div>

    <div id="status" class="status"></div>

    <button id="retryBtn" style="display: none;">Retry</button>
  </div>

  <script>
    const API_URL = "https://halting-gaylene-uninflicted.ngrok-free.dev/api/user/verify-email";

    const message = document.getElementById("message");
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");
    const retryBtn = document.getElementById("retryBtn");

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    console.log(code)

    async function verifyEmail() {
      if (!code) {
        loader.style.display = "none";
        message.innerText = "Invalid verification link.";
        status.innerText = "Missing verification code.";
        status.className = "status error";
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            "ngrok-skip-browser-warning": "true"
          },
          body: JSON.stringify({
            verificationCode: code,
          }),
        });

        const data = await res.json();

        loader.style.display = "none";

        if (res.ok && data.success) {
          message.innerText = "Email verified successfully!";
          status.innerText = "You can now return to the app.";
          status.className = "status success";
        } else {
          throw new Error(data.message || "Verification failed");
        }
      } catch (err) {
        loader.style.display = "none";
        message.innerText = "Verification failed";
        status.innerText = err.message;
        status.className = "status error";
        retryBtn.style.display = "block";
      }
    }

    retryBtn.addEventListener("click", () => {
      loader.style.display = "block";
      retryBtn.style.display = "none";
      status.innerText = "";
      message.innerText = "Retrying...";
      verifyEmail();
    });

    verifyEmail();
  </script>
</body>

</html>

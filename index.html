<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email - NetZero</title>

  <style>
    :root {
      --bg: #0A0A0B;
      --surface: #141419;
      --border: #2A2A35;

      --text-primary: #F2F2FA;
      --text-secondary: #9D9DB5;
      --text-muted: #6B6B80;

      --accent: #00D68F;
      --accent-dark: #00B377;
      --accent-bg: rgba(0, 214, 143, 0.12);

      --error: #FF6B6B;
      --error-bg: rgba(255, 107, 107, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      /* 🚫 removes scrollbar */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 0;
    }

    .status {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 500;
    }

    .success {
      color: var(--accent);
    }

    .error {
      color: var(--error);
    }

    .loader {
      margin: 24px auto;
      width: 42px;
      height: 42px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    button {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: var(--bg);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      background: #333;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Email Verification</h1>
    <p id="message">Verifying your email, please wait...</p>

    <div class="loader" id="loader"></div>

    <div id="status" class="status"></div>

    <button id="retryBtn" style="display: none;">Retry</button>

    <p class="hint">You can safely return to the app after verification</p>
  </div>

  <script>
    const API_URL = "https://halting-gaylene-uninflicted.ngrok-free.dev/api/user/verify-email";

    const message = document.getElementById("message");
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");
    const retryBtn = document.getElementById("retryBtn");

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    async function verifyEmail() {
      if (!code) {
        loader.style.display = "none";
        message.innerText = "Invalid verification link.";
        status.innerText = "Missing verification code.";
        status.className = "status error";
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            "ngrok-skip-browser-warning": "true"
          },
          body: JSON.stringify({
            verificationCode: code,
          }),
        });

        const data = await res.json();
        loader.style.display = "none";

        if (res.ok && data.success) {
          message.innerText = "You're all set!";
          status.innerText = "Email verified successfully. You can return to the app.";
          status.className = "status success";
        } else {
          throw new Error(data.message || "Verification failed");
        }
      } catch (err) {
        loader.style.display = "none";
        message.innerText = "Verification failed";
        status.innerText = err.message;
        status.className = "status error";
        retryBtn.style.display = "block";
      }
    }

    retryBtn.addEventListener("click", () => {
      loader.style.display = "block";
      retryBtn.style.display = "none";
      status.innerText = "";
      message.innerText = "Retrying...";
      verifyEmail();
    });

    verifyEmail();
  </script>
</body>

</html>
